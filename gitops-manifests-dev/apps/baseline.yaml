# Reconciles the per-service namespaces, ServiceAccounts, and NetworkPolicies
# defined under k8s-baseline/ in the platform repo. Sync waves keep namespaces
# created before the SA + NetworkPolicy resources land.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: baseline
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/arun-territory/demo-live-project.git
    targetRevision: main
    path: k8s-baseline
    directory:
      recurse: true
      exclude: 'mesh/*'
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
