name: terraform

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      env:
        description: "Environment to apply (dev|uat|prod)"
        required: true
        default: "dev"

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "0"
  TF_VERSION: "1.9.5"

jobs:
  plan:
    if: github.event_name == 'pull_request'
    name: plan-${{ matrix.env }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [dev, uat, prod]
    defaults:
      run:
        working-directory: infra/envs/${{ matrix.env }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.CI_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform fmt -check -recursive
        working-directory: infra

      - run: terraform init -backend-config="bucket=${{ vars.TFSTATE_BUCKET }}"

      - run: terraform validate

      - run: terraform plan -var-file=terraform.tfvars.example -no-color
        # Until each env has a real (gitignored) tfvars, the example file is the source of truth
        # for CI plans. Switch to a checked-in non-secret tfvars or env-specific secret once stable.

  apply:
    if: github.event_name == 'workflow_dispatch'
    name: apply-${{ inputs.env }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.env }}
    defaults:
      run:
        working-directory: infra/envs/${{ inputs.env }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.CI_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform init -backend-config="bucket=${{ vars.TFSTATE_BUCKET }}"

      - run: terraform apply -auto-approve -var-file=terraform.tfvars.example
