apiVersion: v1
kind: Service
metadata:
  name: {{ include "frontend.name" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "frontend.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      appProtocol: http
  selector: {{- include "frontend.selectorLabels" . | nindent 4 }}
