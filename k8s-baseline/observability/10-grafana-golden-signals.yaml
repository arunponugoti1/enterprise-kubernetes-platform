apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-golden-signals
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  golden-signals.json: |
    {
      "title": "Golden Signals — Fintech Services",
      "uid": "fintech-golden-signals",
      "schemaVersion": 38,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": "Google Managed Prometheus",
            "query": "label_values(istio_requests_total, destination_service_namespace)",
            "multi": true,
            "includeAll": true,
            "current": { "text": "All", "value": "$__all" }
          },
          {
            "name": "service",
            "type": "query",
            "datasource": "Google Managed Prometheus",
            "query": "label_values(istio_requests_total{destination_service_namespace=~\"$namespace\"}, destination_service_name)",
            "multi": true,
            "includeAll": true,
            "current": { "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (RPS)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{destination_service_namespace=~\"$namespace\", destination_service_name=~\"$service\"}[5m])) by (destination_service_name)",
              "legendFormat": "{{destination_service_name}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps", "color": { "mode": "palette-classic" } }
          }
        },
        {
          "id": 2,
          "title": "Error Rate (%)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "100 * sum(rate(istio_requests_total{destination_service_namespace=~\"$namespace\", destination_service_name=~\"$service\", response_code=~\"5..\"}[5m])) by (destination_service_name) / sum(rate(istio_requests_total{destination_service_namespace=~\"$namespace\", destination_service_name=~\"$service\"}[5m])) by (destination_service_name)",
              "legendFormat": "{{destination_service_name}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "P50 / P95 / P99 Latency (ms)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 24, "h": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(istio_request_duration_milliseconds_bucket{destination_service_namespace=~\"$namespace\", destination_service_name=~\"$service\"}[5m])) by (le, destination_service_name))",
              "legendFormat": "p50 {{destination_service_name}}"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{destination_service_namespace=~\"$namespace\", destination_service_name=~\"$service\"}[5m])) by (le, destination_service_name))",
              "legendFormat": "p95 {{destination_service_name}}"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(istio_request_duration_milliseconds_bucket{destination_service_namespace=~\"$namespace\", destination_service_name=~\"$service\"}[5m])) by (le, destination_service_name))",
              "legendFormat": "p99 {{destination_service_name}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "ms" } }
        },
        {
          "id": 4,
          "title": "Saturation — CPU (cores)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=~\"$namespace\", container!=\"\", container!=\"POD\"}[5m])) by (namespace)",
              "legendFormat": "{{namespace}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "cores" } }
        },
        {
          "id": 5,
          "title": "Saturation — Memory (MB)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=~\"$namespace\", container!=\"\", container!=\"POD\"}) by (namespace) / 1024 / 1024",
              "legendFormat": "{{namespace}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "MB" } }
        },
        {
          "id": 6,
          "title": "Pod Restarts",
          "type": "stat",
          "gridPos": { "x": 0, "y": 24, "w": 8, "h": 4 },
          "targets": [
            {
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=~\"$namespace\"}[1h])) by (namespace, pod)",
              "legendFormat": "{{namespace}}/{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            }
          }
        },
        {
          "id": 7,
          "title": "Pub/Sub Unacked Messages",
          "type": "timeseries",
          "gridPos": { "x": 8, "y": 24, "w": 16, "h": 4 },
          "targets": [
            {
              "expr": "stackdriver_pubsub_subscription_pubsub_googleapis_com_subscription_num_undelivered_messages",
              "legendFormat": "{{subscription_id}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } }
        }
      ]
    }
