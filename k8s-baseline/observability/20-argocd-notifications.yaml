apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # ─── Triggers ───────────────────────────────────────────────────────────────
  trigger.on-sync-failed: |
    - description: Application syncing has failed
      send: [app-sync-failed]
      when: app.status.operationState.phase in ['Error', 'Failed']

  trigger.on-sync-succeeded: |
    - description: Application syncing has succeeded
      send: [app-sync-succeeded]
      when: app.status.operationState.phase in ['Succeeded']

  trigger.on-health-degraded: |
    - description: Application has degraded
      send: [app-health-degraded]
      when: app.status.health.status == 'Degraded'

  trigger.on-deployed: |
    - description: Application is synced and healthy
      send: [app-deployed]
      when: app.status.operationState.phase in ['Succeeded'] && app.status.health.status == 'Healthy'

  # ─── Templates ──────────────────────────────────────────────────────────────
  template.app-sync-failed: |
    email:
      subject: "[ArgoCD][{{.app.metadata.name}}] Sync FAILED"
    message: |
      *{{.app.metadata.name}}* sync has **FAILED** on `{{.app.status.operationState.finishedAt}}`.
      Revision: `{{.app.status.operationState.operation.sync.revision}}`
      Error: {{.app.status.operationState.message}}
    slack:
      attachments: |
        [{
          "color": "#E53935",
          "title": "ArgoCD — Sync Failed: {{.app.metadata.name}}",
          "title_link": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
          "fields": [
            {"title": "Revision", "value": "{{.app.status.operationState.operation.sync.revision}}", "short": true},
            {"title": "Env",      "value": "{{.app.metadata.labels.env}}", "short": true},
            {"title": "Error",    "value": "{{.app.status.operationState.message}}"}
          ]
        }]

  template.app-sync-succeeded: |
    message: |
      *{{.app.metadata.name}}* synced successfully.
    slack:
      attachments: |
        [{
          "color": "#43A047",
          "title": "ArgoCD — Sync OK: {{.app.metadata.name}}",
          "title_link": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
          "fields": [
            {"title": "Revision", "value": "{{.app.status.operationState.operation.sync.revision}}", "short": true}
          ]
        }]

  template.app-health-degraded: |
    email:
      subject: "[ArgoCD][{{.app.metadata.name}}] Health DEGRADED"
    message: |
      *{{.app.metadata.name}}* health is **DEGRADED**.
    slack:
      attachments: |
        [{
          "color": "#FB8C00",
          "title": "ArgoCD — Degraded: {{.app.metadata.name}}",
          "title_link": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
          "fields": [
            {"title": "Status", "value": "{{.app.status.health.status}}", "short": true}
          ]
        }]

  template.app-deployed: |
    message: |
      *{{.app.metadata.name}}* deployed and healthy.
    slack:
      attachments: |
        [{
          "color": "#43A047",
          "title": "ArgoCD — Deployed: {{.app.metadata.name}}",
          "title_link": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}"
        }]

  # ─── Default subscriptions (override per-app with annotations) ──────────────
  subscriptions: |
    - recipients:
        - slack:fintech-alerts
        - email:platform-oncall@example.com
      triggers:
        - on-sync-failed
        - on-health-degraded
