---
# Deny everything that isn't explicitly allowed by another policy.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: account-service
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# DNS to kube-system (CoreDNS / NodeLocal DNS).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: account-service
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Egress to private Google APIs (private.googleapis.com / restricted.googleapis.com)
# and to the Cloud SQL Auth Proxy. Tighten further with explicit IPs once the
# Cloud SQL private IP is known and pinned via a per-env overlay.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-google-private-egress
  namespace: account-service
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 199.36.153.8/30   # private.googleapis.com
        - ipBlock:
            cidr: 199.36.153.4/30   # restricted.googleapis.com
      ports:
        - port: 443
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8        # broadens to all RFC1918 — narrow in prod overlay
      ports:
        - port: 5432
          protocol: TCP
