apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "account-service.name" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "account-service.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels: {{- include "account-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "account-service.labels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: {{ include "account-service.name" . }}
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: {{- include "account-service.selectorLabels" . | nindent 14 }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: DB_HOST
              value: "127.0.0.1"
            - name: DB_PORT
              value: "5432"
          envFrom:
            - secretRef:
                name: account-service-db
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 5
          resources: {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
        # Cloud SQL Auth Proxy: authenticates to the Postgres instance using the
        # pod's Workload Identity GSA. App connects to 127.0.0.1:5432 — no
        # password leaves the pod boundary unencrypted, no DB client cert
        # rotation to manage.
        - name: cloud-sql-proxy
          image: {{ .Values.cloudSql.proxyImage }}
          args:
            - "--structured-logs"
            - "--port=5432"
            - "--private-ip"
            - "--health-check"
            - "--http-port=9090"
            - "{{ .Values.cloudSql.instanceConnectionName }}"
          ports:
            - name: proxy-health
              containerPort: 9090
          startupProbe:
            httpGet:
              path: /startup
              port: proxy-health
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /liveness
              port: proxy-health
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readiness
              port: proxy-health
            periodSeconds: 10
          resources: {{- toYaml .Values.cloudSql.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: tmp
          emptyDir: {}
