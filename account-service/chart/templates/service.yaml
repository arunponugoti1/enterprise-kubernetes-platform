apiVersion: v1
kind: Service
metadata:
  name: {{ include "account-service.name" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "account-service.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      appProtocol: http
  selector: {{- include "account-service.selectorLabels" . | nindent 4 }}
