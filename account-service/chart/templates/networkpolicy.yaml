---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: {{ .Release.Namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: {{ .Release.Namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-google-private-egress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 199.36.153.8/30
        - ipBlock:
            cidr: 199.36.153.4/30
      ports:
        - port: 443
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - port: 5432
          protocol: TCP
---
# Ingress allow-list mirrors the Istio AuthorizationPolicy: api-gateway and
# transaction-service may reach the app port; the asm-gateways namespace can
# also reach it for direct ingress traffic.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-callers
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels: {{- include "account-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: api-gateway
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: transaction-service
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: asm-gateways
      ports:
        - port: 8080
          protocol: TCP
