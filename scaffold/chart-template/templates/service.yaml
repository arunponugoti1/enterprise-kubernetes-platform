apiVersion: v1
kind: Service
metadata:
  name: {{ include "SERVICE_NAME.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "SERVICE_NAME.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "SERVICE_NAME.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
